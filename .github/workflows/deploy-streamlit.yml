name: Deploy Streamlit to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "projects/02-ecommerce-cohort-analysis/streamlit/**"
      - "projects/02-ecommerce-cohort-analysis/requirements.txt"
      - "projects/02-ecommerce-cohort-analysis/Dockerfile"
      - "e2e/ecommerce-cohorts.*"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: da-cohort-streamlit
  REPO_NAME: da-portfolio-api
  DATA_BUCKET: gs://da-portfolio-data-assets

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download test data from GCS
        run: |
          mkdir -p projects/02-ecommerce-cohort-analysis/data/processed
          gcloud storage cp "${{ env.DATA_BUCKET }}/cohort-processed/*" projects/02-ecommerce-cohort-analysis/data/processed/

      - name: Install Python dependencies
        run: pip install -r projects/02-ecommerce-cohort-analysis/requirements.txt

      - name: Verify test data
        run: |
          if [ -z "$(ls -A projects/02-ecommerce-cohort-analysis/data/processed 2>/dev/null)" ]; then
            echo "FATAL: No processed data files after GCS download"
            exit 1
          fi
          echo "Data files present:"
          ls -la projects/02-ecommerce-cohort-analysis/data/processed/

      - name: Start Streamlit
        run: streamlit run app.py --server.headless true --server.port 8501 &
        working-directory: projects/02-ecommerce-cohort-analysis/streamlit

      - name: Install Playwright
        run: npm ci && npx playwright install --with-deps chromium

      - name: Wait for Streamlit
        run: npx -y wait-on tcp:localhost:8501 --timeout 30000

      - name: Run deploy gate tests
        run: npx playwright test --config=e2e/ecommerce-cohorts.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download data from GCS
        run: |
          mkdir -p projects/02-ecommerce-cohort-analysis/data/processed
          gcloud storage cp "${{ env.DATA_BUCKET }}/cohort-processed/*" projects/02-ecommerce-cohort-analysis/data/processed/

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f projects/02-ecommerce-cohort-analysis/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --port=8501

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$HTTP" = "200" ]; then
              echo "PASS: deployed URL returned 200 (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP -- retrying in 10s"
            sleep 10
          done
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: deployed URL never returned 200"
            exit 1
          fi
