name: Deploy Streamlit to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "projects/02-ecommerce-cohort-analysis/streamlit/**"
      - "projects/02-ecommerce-cohort-analysis/requirements.txt"
      - "projects/02-ecommerce-cohort-analysis/Dockerfile"
      - "e2e/ecommerce-cohorts.*"

  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: da-cohort-streamlit
  REPO_NAME: da-portfolio-api
  DATA_BUCKET: gs://da-portfolio-data-assets

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python dependencies
        run: pip install -r projects/02-ecommerce-cohort-analysis/requirements.txt

      - name: Copy test data
        run: |
          mkdir -p projects/02-ecommerce-cohort-analysis/data/processed
          if [ -d "projects/02-ecommerce-cohort-analysis/data/processed" ] && [ "$(ls -A projects/02-ecommerce-cohort-analysis/data/processed 2>/dev/null)" ]; then
            echo "Data files exist"
          else
            echo "WARNING: No processed data files found -- Streamlit may fail to load data"
            echo "Skipping test (data not available in CI without GCS)"
            exit 0
          fi

      - name: Start Streamlit
        run: streamlit run app.py --server.headless true --server.port 8501 &
        working-directory: projects/02-ecommerce-cohort-analysis/streamlit

      - name: Install Playwright
        run: npm i -g @playwright/test && npx playwright install --with-deps chromium

      - name: Wait for Streamlit
        run: npx -y wait-on http://localhost:8501 --timeout 30000

      - name: Run deploy gate tests
        run: npx playwright test --config=e2e/ecommerce-cohorts.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download data from GCS
        run: |
          mkdir -p projects/02-ecommerce-cohort-analysis/data/processed
          gcloud storage cp "${{ env.DATA_BUCKET }}/cohort-processed/*" projects/02-ecommerce-cohort-analysis/data/processed/

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f projects/02-ecommerce-cohort-analysis/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --port=8501

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
