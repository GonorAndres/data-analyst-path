name: Deploy Insurance Claims Dashboard

on:
  push:
    branches: [main]
    paths:
      - "projects/01-insurance-claims-dashboard/src/**"
      - "projects/01-insurance-claims-dashboard/public/**"
      - "projects/01-insurance-claims-dashboard/package.json"
      - "projects/01-insurance-claims-dashboard/next.config.js"
      - "projects/01-insurance-claims-dashboard/tailwind.config.ts"
      - "e2e/insurance-claims.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_4W4jqiF2MFMVNL2hbJEUlRF5NquG

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: projects/01-insurance-claims-dashboard

      - name: Build
        run: npm run build
        working-directory: projects/01-insurance-claims-dashboard

      - name: Install Playwright
        run: npm ci && npx playwright install --with-deps chromium

      - name: Start server
        run: npm start &
        working-directory: projects/01-insurance-claims-dashboard

      - name: Wait for server
        run: npx -y wait-on http://localhost:3000 --timeout 30000

      - name: Run deploy gate tests
        run: npx playwright test --config=e2e/insurance-claims.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/01-insurance-claims-dashboard

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/01-insurance-claims-dashboard

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        working-directory: projects/01-insurance-claims-dashboard

      - name: Verify deployment
        run: |
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ steps.deploy.outputs.url }}")
            if [ "$HTTP" = "200" ]; then
              echo "PASS: deployed URL returned 200 (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP -- retrying in 10s"
            sleep 10
          done
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: deployed URL never returned 200"
            exit 1
          fi
