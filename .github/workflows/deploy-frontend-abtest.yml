name: Deploy AB Test Analysis

on:
  push:
    branches: [main, dev]
    paths:
      - "projects/03-ab-test-analysis/src/**"
      - "projects/03-ab-test-analysis/public/**"
      - "projects/03-ab-test-analysis/package.json"
      - "projects/03-ab-test-analysis/next.config.js"
      - "projects/03-ab-test-analysis/tailwind.config.ts"
      - "e2e/ab-test.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_bd4chQuPydvL7VZGUh00aMrWs4eg

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: projects/03-ab-test-analysis

      - name: Build
        run: npm run build
        working-directory: projects/03-ab-test-analysis

      - name: Install Playwright
        run: npm ci && npx playwright install --with-deps chromium

      - name: Start server
        run: npm start &
        working-directory: projects/03-ab-test-analysis

      - name: Wait for server
        run: npx -y wait-on tcp:localhost:3053 --timeout 30000

      - name: Run deploy gate tests
        run: npx playwright test --config=e2e/ab-test.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    env:
      VERCEL_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      VERCEL_PROD_FLAG: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ env.VERCEL_ENV }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/03-ab-test-analysis

      - name: Build
        run: vercel build ${{ env.VERCEL_PROD_FLAG }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/03-ab-test-analysis

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ env.VERCEL_PROD_FLAG }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed ($VERCEL_ENV) to: $URL"
        working-directory: projects/03-ab-test-analysis

      - name: Verify deployment
        run: |
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ steps.deploy.outputs.url }}")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "401" ] || [ "$HTTP" = "308" ]; then
              echo "PASS: deployed URL returned 200 (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP -- retrying in 10s"
            sleep 10
          done
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "401" ] && [ "$HTTP" != "308" ]; then
            echo "FAIL: deployed URL never returned 200"
            exit 1
          fi
