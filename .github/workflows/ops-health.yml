name: Health Check (All Services)

on:
  schedule:
    # Every 6 hours at minute 0: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run health checks
        id: check
        run: python ops/health_check.py

      - name: Open or update health alert issue
        if: steps.check.outputs.failed_count != '0'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            const title = 'Health alert: DA portfolio service(s) down';
            const body = `${process.env.REPORT}\n\n_Auto-managed by \`.github/workflows/ops-health.yml\`._`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              console.log(`Created issue #${created.number}`);
            }

      - name: Close health alert issue if all green
        if: steps.check.outputs.failed_count == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Health alert: DA portfolio service(s) down';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: 'All services healthy. Auto-closed.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              console.log(`Closed issue #${existing.number}`);
            }
