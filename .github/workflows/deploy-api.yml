name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "projects/00-demo-aestehtics/backend/**"
      - "projects/01-insurance-claims-dashboard/backend/**"
      - "projects/03-ab-test-analysis/backend/**"
      - "projects/04-executive-kpi-report/backend/**"
      - "projects/06-operational-efficiency/backend/**"

  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: da-portfolio-api
  REPO_NAME: da-portfolio-api
  DATA_BUCKET: gs://da-portfolio-data-assets

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download data from GCS
        run: |
          mkdir -p projects/00-demo-aestehtics/backend/data
          mkdir -p projects/01-insurance-claims-dashboard/data/processed
          mkdir -p projects/03-ab-test-analysis/data/processed
          mkdir -p projects/04-executive-kpi-report/data/processed
          mkdir -p projects/06-operational-efficiency/data/processed
          gcloud storage cp "${{ env.DATA_BUCKET }}/olist-backend/*" projects/00-demo-aestehtics/backend/data/
          gcloud storage cp "${{ env.DATA_BUCKET }}/insurance-processed/*" projects/01-insurance-claims-dashboard/data/processed/
          gcloud storage cp "${{ env.DATA_BUCKET }}/abtest-processed/*" projects/03-ab-test-analysis/data/processed/
          gcloud storage cp "${{ env.DATA_BUCKET }}/kpi-processed/*" projects/04-executive-kpi-report/data/processed/
          gcloud storage cp "${{ env.DATA_BUCKET }}/ops-processed/*" projects/06-operational-efficiency/data/processed/

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --memory=2Gi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --port=8080

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
          echo "Health check: $URL/health"
          echo "Insurance: $URL/insurance/health"
          echo "Olist: $URL/olist/health"
          echo "A/B Test: $URL/abtest/health"
          echo "KPI: $URL/kpi/health"
          echo "Ops: $URL/ops/health"
