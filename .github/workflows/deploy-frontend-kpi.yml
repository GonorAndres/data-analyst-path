name: Deploy Executive KPI Report

on:
  push:
    branches: [main]
    paths:
      - "projects/04-executive-kpi-report/src/**"
      - "projects/04-executive-kpi-report/public/**"
      - "projects/04-executive-kpi-report/package.json"
      - "projects/04-executive-kpi-report/next.config.js"
      - "projects/04-executive-kpi-report/tailwind.config.ts"
      - "e2e/executive-kpi.*"
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_XUdzqOOlVB7WKx8UGJMb4u7rXb2n

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: projects/04-executive-kpi-report

      - name: Build
        run: npm run build
        working-directory: projects/04-executive-kpi-report

      - name: Install Playwright
        run: npm i -g @playwright/test && npx playwright install --with-deps chromium

      - name: Start server
        run: npm start &
        working-directory: projects/04-executive-kpi-report

      - name: Wait for server
        run: npx -y wait-on http://localhost:3000 --timeout 15000

      - name: Run deploy gate tests
        run: npx playwright test --config=e2e/executive-kpi.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/04-executive-kpi-report

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/04-executive-kpi-report

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        working-directory: projects/04-executive-kpi-report
