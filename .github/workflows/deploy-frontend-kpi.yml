name: Deploy Executive KPI Report

on:
  push:
    branches: [main]
    paths:
      - "projects/04-executive-kpi-report/src/**"
      - "projects/04-executive-kpi-report/public/**"
      - "projects/04-executive-kpi-report/package.json"
      - "projects/04-executive-kpi-report/next.config.js"
      - "projects/04-executive-kpi-report/tailwind.config.ts"
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_XUdzqOOlVB7WKx8UGJMb4u7rXb2n

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/04-executive-kpi-report

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: projects/04-executive-kpi-report

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        working-directory: projects/04-executive-kpi-report

      - name: Smoke test
        run: |
          sleep 10
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://executive-kpi-report.vercel.app")
          echo "GET / -> HTTP $HTTP"
          if [ "$HTTP" -ge 400 ]; then
            echo "FAIL: site returned HTTP $HTTP"
            exit 1
          fi
          echo "PASS"
