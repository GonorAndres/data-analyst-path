# Live URL registry for the Data Analyst portfolio.
# Single source of truth consumed by:
#   - .github/workflows/ops-health.yml  (health cron)
#   - CLAUDE.md / README references
#
# Branch -> environment mapping:
#   main -> production (deployed + monitored)
#   dev  -> preview    (Vercel frontends only; API/Streamlit skip deploy)
#
# When a URL changes (custom domain, Vercel rename, Cloud Run redeploy with a
# different service name) update this file first, then let workflows pick it up.

schema_version: 1
updated: 2026-04-12

